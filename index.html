<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Binary Cat</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; }
  #scene { position:relative; width:100%; height:100%; }
  #rain {
    position:absolute;
    inset:-8%;
    width:116%; height:116%;
    will-change:transform;
  }
  #holo { position:absolute; inset:0; width:100%; height:100%; mix-blend-mode:color-dodge; pointer-events:none; }
  #spec { position:absolute; inset:0; width:100%; height:100%; mix-blend-mode:screen; pointer-events:none; }
  #cat  {
    position:absolute;
    inset:-3%; width:106%; height:106%;
    object-fit:contain; object-position:center;
    image-rendering:pixelated;
    will-change:transform;
    mix-blend-mode:screen;
  }
  #overlay {
    position:absolute; inset:0;
    background:rgba(0,0,0,0.92);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:24px; z-index:30;
  }
  #kaomoji { font-size:48px; animation:float 3s ease-in-out infinite; }
  @keyframes float {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-10px); }
  }
  #overlay p {
    color:rgba(0,255,80,0.6);
    font-family:monospace;
    font-size:15px; letter-spacing:0.08em;
    text-align:center; line-height:2;
  }
  #startBtn {
    font-family:monospace; font-size:14px;
    color:#00ff55; background:transparent;
    border:1px solid rgba(0,255,80,0.4);
    border-radius:4px; padding:14px 48px;
    letter-spacing:0.15em; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { border-color:rgba(0,255,80,0.3); color:rgba(0,255,80,0.7); }
    50%      { border-color:rgba(0,255,80,0.8); color:#00ff55; }
  }
  #startBtn:active { background:rgba(0,255,80,0.08); }
</style>
</head>
<body>

  <canvas id="holo"></canvas>
  <canvas id="spec"></canvas>

  <div id="overlay">
    <div id="kaomoji">o(＊＾▽＾＊)o♪</div>
    <p>Ready for a cat-astrophic<br>code rain experience?</p>
    <button id="startBtn">[ ENTER MATRIX ]</button>
  </div>
</div>
<script>
const BG_MOVE=7, FG_MOVE=4, TILT_RANGE=28, RAINBOW_O=0.28, SPECULAR_O=0.65, SPARKLE_COUNT=80, LERP=0.07, FONT_SIZE=13
const rainC=document.getElementById('rain')
const holoC=document.getElementById('holo')
const specC=document.getElementById('spec')
const cat=document.getElementById('cat')
const rCtx=rainC.getContext('2d')
const hCtx=holoC.getContext('2d')
const sCtx=specC.getContext('2d')
let W=0,H=0,rawX=0,rawY=0,curX=0,curY=0,betaOffset=null
const cols=[],sparkles=[]

function resize(){
  W=rainC.width=window.innerWidth*1.16|0
  H=rainC.height=window.innerHeight*1.16|0
  holoC.width=specC.width=window.innerWidth
  holoC.height=specC.height=window.innerHeight
  cols.length=0
  for(let x=0;x<W;x+=FONT_SIZE)
    cols.push({y:Math.random()*H, speed:0.5+Math.random()*1.5, bright:Math.random()>0.65})
  sparkles.length=0
  for(let i=0;i<SPARKLE_COUNT;i++)
    sparkles.push({x:Math.random(),y:Math.random(),r:0.5+Math.random()*2,
      phase:Math.random()*Math.PI*2,speed:0.8+Math.random()*1.2})
}
window.addEventListener('resize',resize)

function drawRain(){
  rCtx.fillStyle='rgba(0,0,0,0.15)'
  rCtx.fillRect(0,0,W,H)
  rCtx.font='bold '+FONT_SIZE+'px monospace'
  cols.forEach((col,i)=>{
    const ch=Math.random()>0.5?'1':'0'
    const head=Math.random()>0.93
    rCtx.fillStyle=head?'#efffef':col.bright?'#00ee44':'#006622'
    rCtx.fillText(ch,i*FONT_SIZE,col.y)
    col.y+=FONT_SIZE*col.speed
    if(col.y>H+FONT_SIZE&&Math.random()>0.96) col.y=0
  })
}

function drawHolo(px,py){
  const VW=window.innerWidth, VH=window.innerHeight
  hCtx.clearRect(0,0,VW,VH)
  const angle=Math.atan2(py,px)+Math.PI*0.5
  const cos=Math.cos(angle),sin=Math.sin(angle),d=Math.max(VW,VH)*1.1
  const cx=VW*0.5,cy=VH*0.5
  const g=hCtx.createLinearGradient(
    cx+cos*d*(0.3+px*0.3),cy+sin*d*(0.3+py*0.3),
    cx-cos*d*(0.3-px*0.3),cy-sin*d*(0.3-py*0.3))
  const o=RAINBOW_O
  g.addColorStop(0.00,`rgba(0,255,80,0)`)
  g.addColorStop(0.20,`rgba(0,255,120,${o})`)
  g.addColorStop(0.40,`rgba(0,200,255,${o})`)
  g.addColorStop(0.60,`rgba(120,255,0,${o})`)
  g.addColorStop(0.80,`rgba(0,255,80,${o*0.7})`)
  g.addColorStop(1.00,`rgba(0,180,60,0)`)
  hCtx.fillStyle=g; hCtx.fillRect(0,0,VW,VH)
}

function drawSpec(px,py){
  const VW=window.innerWidth, VH=window.innerHeight
  sCtx.clearRect(0,0,VW,VH)
  const sx=VW*(0.5+px*0.38),sy=VH*(0.5+py*0.38),r=Math.max(VW,VH)*0.55
  const spot=sCtx.createRadialGradient(sx,sy,0,sx,sy,r),o=SPECULAR_O
  spot.addColorStop(0,`rgba(180,255,180,${o})`)
  spot.addColorStop(0.12,`rgba(180,255,180,${o*0.4})`)
  spot.addColorStop(0.4,`rgba(180,255,180,${o*0.06})`)
  spot.addColorStop(1,`rgba(180,255,180,0)`)
  sCtx.fillStyle=spot; sCtx.fillRect(0,0,VW,VH)
  const t=Date.now()*0.002
  sparkles.forEach(sp=>{
    const ax=sp.x*VW,ay=sp.y*VH
    const dist=Math.hypot(ax-sx,ay-sy)
    const prox=Math.max(0,1-dist/r)
    const alpha=prox*(Math.sin(t*sp.speed+sp.phase)*0.5+0.5)*0.9
    if(alpha<0.05) return
    const sz=sp.r*(1+prox)
    sCtx.save(); sCtx.globalAlpha=alpha; sCtx.fillStyle='#afffaf'
    sCtx.beginPath(); sCtx.ellipse(ax,ay,sz*4,sz*0.5,0,0,Math.PI*2); sCtx.fill()
    sCtx.beginPath(); sCtx.ellipse(ax,ay,sz*0.5,sz*4,0,0,Math.PI*2); sCtx.fill()
    sCtx.restore()
  })
}

function loop(){
  curX+=(rawX-curX)*LERP
  curY+=(rawY-curY)*LERP
  const px=Math.max(-1,Math.min(1,curX/TILT_RANGE))
  const py=Math.max(-1,Math.min(1,curY/TILT_RANGE))
  drawRain()
  drawHolo(px,py)
  drawSpec(px,py)
  rainC.style.transform=`translate(${-px*BG_MOVE}%,${-py*BG_MOVE}%)`
  cat.style.transform=`translate(${px*FG_MOVE}%,${py*FG_MOVE}%)`
  requestAnimationFrame(loop)
}

function onOrientation(e){
  rawX=e.gamma||0
  if(betaOffset===null) betaOffset=e.beta||90
  rawY=(e.beta||90)-betaOffset
}
document.addEventListener('mousemove',e=>{
  rawX=(e.clientX/window.innerWidth-0.5)*TILT_RANGE*2
  rawY=(e.clientY/window.innerHeight-0.5)*TILT_RANGE*2
})
document.addEventListener('touchmove',e=>{
  e.preventDefault()
  rawX=(e.touches[0].clientX/window.innerWidth-0.5)*TILT_RANGE*2
  rawY=(e.touches[0].clientY/window.innerHeight-0.5)*TILT_RANGE*2
},{passive:false})

document.getElementById('startBtn').addEventListener('click',async()=>{
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const res=await DeviceOrientationEvent.requestPermission()
      if(res==='granted') window.addEventListener('deviceorientation',onOrientation)
    }catch(e){}
  } else if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation',onOrientation)
  }
  document.getElementById('overlay').style.display='none'
  resize(); loop()
})
</script>
</body>
